<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Re: Match 遊戲再易局</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { margin-bottom: 2rem; }
    </style>
</head>

<body>
    
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🎮 Re: Match 遊戲再易局</a>

            <div class="ms-auto d-flex align-items-center">
                
                <form class="d-flex me-3" action="{{ url_for('search') }}" method="GET">
                    <input class="form-control form-control-sm me-2" type="search" name="q" 
                        placeholder="搜尋遊戲" aria-label="Search" style="width: 180px;">
                    <button class="btn btn-outline-light btn-sm" type="submit">🔍</button>
                </form>

                <div class="d-flex align-items-center">
                    {% if current_user.is_authenticated %}
                        <span class="text-light me-3 small">👤 {{ current_user.username }}</span>
                        <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">登出</a>
                    {% else %}
                        <a href="{{ url_for('login') }}" class="btn btn-outline-light btn-sm me-2">登入</a>
                        <a href="{{ url_for('register') }}" class="btn btn-light btn-sm">註冊</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <div class="container"> 
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
